services:
  - type: web
    name: orin-backend
    env: docker
    plan: free
    region: ohio
    dockerCommand: ./start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false # Set to your vercel URL
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false # Set to https://backend-url/api/auth
      - key: GEMINI_API_KEY
        sync: true
      - key: NOTION_OAUTH_CLIENT_ID
        sync: false
      - key: NOTION_OAUTH_CLIENT_SECRET
        sync: false
      - key: NOTION_OAUTH_REDIRECT_URI
        sync: false # Set to https://backend-url/api/notion/rest/callback
      - key: NOTION_MCP_OAUTH_REDIRECT_URI
        sync: false # Set to https://backend-url/api/notion/mcp/callback
